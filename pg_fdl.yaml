functions:
  oscar:
    - oscar-cluster:
        name: airflow-postgres66
        memory: 500Mi
        cpu: '0.5'
        image: localhost:5001/pg-flask-sidecar:latest
        script: entrypoint.sh
        environment:
          Variables:
            POSTGRES_USER: "airflow"
            POSTGRES_PASSWORD: "airflow"
            POSTGRES_DB: "airflow"
        expose:
          min_scale: 1
          max_scale: 1
          api_port: 5000
          cpu_threshold: 90
          rewrite_target: true


